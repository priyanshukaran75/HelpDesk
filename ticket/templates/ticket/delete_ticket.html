{% extends "base1.html" %}
{% block title %}Delete Ticket{% endblock %}
{% block content %}
<div class="delete-container">
    <h2>Delete Ticket</h2>
    <p>
        Are you sure you want to delete
        <strong>{{ ticket.title }}</strong>?
    </p>
    <form method="post">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit" class="btn-delete">
            Yes, Delete
        </button>
        <a href="{% url 'myticket' %}" class="btn-cancel">
            Cancel
        </a>
    </form>
</div>
{% endblock %}
